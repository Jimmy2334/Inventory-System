<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suppliers</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      body {
        background-color: #f4f6f9;
      }
      .supplier-table thead tr th {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #6c757d;
      }
      .supplier-table tbody tr td {
        vertical-align: middle;
      }
      .email-link {
        color: #0d6efd;
        text-decoration: none;
      }
      .email-link:hover {
        text-decoration: underline;
      }
      .products-badge {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: #0dcaf0;
        color: #fff;
        font-size: 0.8rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn-icon {
        width: 32px;
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 6px;
      }
      .btn-icon-edit {
        border: 1px solid #dee2e6;
        background: #fff;
        color: #0d6efd;
      }
      .btn-icon-edit:hover {
        background: #e9f0ff;
        border-color: #0d6efd;
      }
      .btn-icon-delete {
        border: 1px solid #dee2e6;
        background: #fff;
        color: #dc3545;
      }
      .btn-icon-delete:hover {
        background: #fde8ea;
        border-color: #dc3545;
      }
    </style>
  </head>
  <body>
    <!-- suppliers content only as the main content -->
    <main>
      <section id="suppliers-section" class="container-fluid">
        <div class="card shadow px-3 py-4 mx-3 my-4">
          <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-center border-bottom pb-3 mb-3"
          >
            <h5 class="d-inline-block w-100 w-md-auto mb-3 mb-md-0">
              <i class="fas fa-truck text-secondary"></i> Suppliers
            </h5>
            <div
              class="supplier-actions d-flex gap-4 justify-content-between align-items-center w-100 mt-3 mt-md-0"
            >
              <div class="input-group">
                <div class="input-group-text bg-light">
                  <i class="fa fa-search text-secondary" aria-hidden="true"></i>
                </div>
                <input
                  class="form-control"
                  type="search"
                  name="search"
                  id="search-input"
                  placeholder="Search suppliers..."
                />
              </div>

              <button
                id="addSupplier"
                class="btn btn-primary btn-sm w-fit py-2 d-flex align-items-center"
                data-bs-toggle="modal"
                data-bs-target="#supplierModal"
              >
                <span><i class="fas fa-plus me-2"></i></span>
                <span class="d-none d-lg-inline-block text-nowrap">Add supplier</span>
              </button>
            </div>
          </div>

          <div class="table-wrapper table-responsive">
            <table class="table supplier-table table-hover overflow-scroll">
              <thead>
                <tr class="table-secondary">
                  <th>Company Name</th>
                  <th>Contact Person</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Products</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>TechWorld Ltd</td>
                  <td>Ahmed Hassan</td>
                  <td>+20 100 123 4567</td>
                  <td><a href="mailto:ahmed@techworld.eg" class="email-link">ahmed@techworld.eg</a></td>
                  <td><span class="products-badge">5</span></td>
                  <td>
                    <div class="d-flex gap-2">
                      <button class="btn btn-icon btn-icon-edit" title="Edit">
                        <i class="fas fa-pen fa-xs"></i>
                      </button>
                      <button class="btn btn-icon btn-icon-delete" title="Delete">
                        <i class="fas fa-trash fa-xs"></i>
                      </button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>Cairo Paper Co.</td>
                  <td>Sara Nour</td>
                  <td>+20 112 987 6543</td>
                  <td><a href="mailto:sara@cairopaper.eg" class="email-link">sara@cairopaper.eg</a></td>
                  <td><span class="products-badge">1</span></td>
                  <td>
                    <div class="d-flex gap-2">
                      <button class="btn btn-icon btn-icon-edit" title="Edit">
                        <i class="fas fa-pen fa-xs"></i>
                      </button>
                      <button class="btn btn-icon btn-icon-delete" title="Delete">
                        <i class="fas fa-trash fa-xs"></i>
                      </button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>Global Supplies</td>
                  <td>Mona Fawzy</td>
                  <td>+20 122 456 7890</td>
                  <td><a href="mailto:mona@globalsup.com" class="email-link">mona@globalsup.com</a></td>
                  <td><span class="products-badge">2</span></td>
                  <td>
                    <div class="d-flex gap-2">
                      <button class="btn btn-icon btn-icon-edit" title="Edit">
                        <i class="fas fa-pen fa-xs"></i>
                      </button>
                      <button class="btn btn-icon btn-icon-delete" title="Delete">
                        <i class="fas fa-trash fa-xs"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Add/Edit Supplier Modal -->
      <div
        class="modal fade"
        id="supplierModal"
        tabindex="-1"
        aria-labelledby="supplierModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="supplierModalLabel">
                Add Supplier
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <form id="supplierForm">
              <div class="modal-body">
                <div class="mb-3">
                  <label for="companyName" class="form-label">Company Name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="companyName"
                    placeholder="Enter company name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="contactPerson" class="form-label">Contact Person</label>
                  <input
                    type="text"
                    class="form-control"
                    id="contactPerson"
                    placeholder="Enter contact person name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="supplierPhone" class="form-label">Phone</label>
                  <input
                    type="tel"
                    class="form-control"
                    id="supplierPhone"
                    placeholder="Enter phone number"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="supplierEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="supplierEmail"
                    placeholder="Enter email address"
                    required
                  />
                </div>
              </div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-light border"
                  data-bs-dismiss="modal"
                >
                  Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                  Save Supplier
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
