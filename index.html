<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <i class="fas fa-cube"></i>
            </div>
            <h2 class="logo-text">InvenTrack</h2>
        </div>
        <button class="btn-close-sidebar" id="closeSidebarBtn" aria-label="Close sidebar">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-link active" data-page="dashboard">
            <i class="nav-icon fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
            <span class="nav-badge"></span>
        </a>
        
        <a href="#products" class="nav-link" data-page="products">
            <i class="nav-icon fas fa-boxes"></i>
            <span class="nav-text">Products</span>
        </a>
        
        <a href="#inventory" class="nav-link" data-page="inventory">
            <i class="nav-icon fas fa-warehouse"></i>
            <span class="nav-text">Inventory</span>
        </a>

        <div class="nav-item-group">
            <button class="nav-link nav-dropdown" data-toggle="dropdown" aria-expanded="false">
                <i class="nav-icon fas fa-shopping-cart"></i>
                <span class="nav-text">Orders</span>
                <i class="dropdown-arrow fas fa-chevron-down"></i>
            </button>
            <div class="dropdown-menu">
                <a href="#orders" class="dropdown-link" data-page="orders">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Purchase Orders</span>
                </a>
                <a href="#adjustments" class="dropdown-link" data-page="adjustments">
                    <i class="fas fa-edit"></i>
                    <span>Stock Adjustments</span>
                </a>
            </div>
        </div>
        
        <a href="#suppliers" class="nav-link" data-page="suppliers">
            <i class="nav-icon fas fa-handshake"></i>
            <span class="nav-text">Suppliers</span>
        </a>
        
        <a href="#reports" class="nav-link" data-page="reports">
            <i class="nav-icon fas fa-chart-bar"></i>
            <span class="nav-text">Reports</span>
        </a>
        
        <a href="#activity" class="nav-link" data-page="activity">
            <i class="nav-icon fas fa-history"></i>
            <span class="nav-text">Activity Log</span>
        </a>

        <div class="nav-divider"></div>

        <a href="#settings" class="nav-link" data-page="settings">
            <i class="nav-icon fas fa-cog"></i>
            <span class="nav-text">Settings</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <button class="btn btn-logout w-100" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="js/modules/sidebar.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

</body>
</html>
